[project]
name = "ed-insights-pipeline"
version = "0.1.0"
description = "Data collection pipeline for Ed Insights Platform"
requires-python = ">=3.12"
dependencies = [
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "pandas>=2.2",
    "numpy>=1.26",
    "rich>=13.0",
    "lxml>=5.0",
    "pyarrow>=15.0",
    "psycopg2-binary>=2.9",
]

[project.scripts]
scrape = "scripts.scrape:main"
load-db = "scripts.load_db:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src", "scripts"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
