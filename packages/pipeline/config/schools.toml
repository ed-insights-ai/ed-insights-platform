# Ed Insights Platform — School Configuration
# Source of truth: GAC standings API (greatamericanconference.com/services/standings.ashx)
# Last verified: 2026-03-16
#
# GAC Soccer Programs: 7 men's + 7 women's = 14 total
#
# scraper values:
#   statcrew       — static HTML (Harding only)
#   sidearm        — SideArm New (Nuxt3/Vue, SSR boxscore links)
#   sidearm_legacy — SideArm Legacy (KnockoutJS SPA, NOT YET IMPLEMENTED)
#
# data_status values:
#   verified   — URL confirmed live, sport confirmed present, scraper confirmed working
#   unverified — config set but not tested end-to-end
#   absent     — sport not present on this platform (different data source needed)

